<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>盯盘 Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Microsoft YaHei', sans-serif; background: #0f1923; color: #e0e6ed; padding: 16px; }
  .container { max-width: 1600px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 8px; }
  .header h1 { font-size: 22px; color: #fff; }
  .header .time { color: #8899aa; font-size: 14px; }
  .indices { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .index-card { background: #1a2a3a; border-radius: 10px; padding: 10px 18px; flex: 1; min-width: 120px; text-align: center; }
  .index-card .name { font-size: 12px; color: #8899aa; }
  .index-card .price { font-size: 20px; font-weight: bold; margin: 2px 0; }
  .index-card .change { font-size: 13px; }
  .up { color: #e74c3c; } .down { color: #2ecc71; }
  .main-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 20px; height: 500px; }
  .main-grid > * { display: flex; flex-direction: column; overflow: hidden; }

  /* 持仓卡片 */
  #positionPanel { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .pos-wrap { background: linear-gradient(135deg, #1a2a3a, #0f1923); border: 2px solid #f39c12; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; overflow: hidden; }
  .pos-wrap .title { font-size: 16px; color: #f39c12; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .pos-wrap .title .badge { background: #f39c12; color: #0f1923; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
  .pos-row1 { display: flex; justify-content: space-between; align-items: center; }
  .pos-name { font-size: 22px; font-weight: bold; }
  .pos-code { font-size: 12px; color: #8899aa; }
  .pos-price-lg { font-size: 32px; font-weight: bold; }
  .pos-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin: 12px 0; }
  .pos-grid .item { background: #1a2a3a; border-radius: 8px; padding: 8px; text-align: center; }
  .pos-grid .item .lbl { font-size: 11px; color: #8899aa; }
  .pos-grid .item .val { font-size: 15px; font-weight: bold; margin-top: 2px; }

  /* 买入依据 */
  .reason-box { background: #0f1923; border-radius: 8px; padding: 12px; margin-top: 10px; border-left: 3px solid #f39c12; }
  .reason-box .r-title { font-size: 13px; color: #f39c12; margin-bottom: 6px; font-weight: bold; }
  .reason-box .r-line { font-size: 12px; color: #b0c0d0; padding: 2px 0; display: flex; }
  .reason-box .r-label { color: #8899aa; min-width: 60px; }
  .reason-box .r-value { flex: 1; }
  .stop-loss-box { background: #2c1515; border-radius: 6px; padding: 10px; margin-top: 8px; border-left: 3px solid #e74c3c; }
  .stop-loss-box .sl-line { font-size: 12px; color: #e74c3c; padding: 1px 0; }

  /* Top 10 */
  #top10Panel { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .top10-wrap { background: #1a2a3a; border-radius: 12px; padding: 20px; font-size: 13px; display: flex; flex-direction: column; overflow: hidden; flex: 1; }
  .top10-wrap .tr-h, .top10-wrap .title { flex-shrink: 0; }
  .top10-scroll { flex: 1; overflow-y: auto; min-height: 0; padding-right: 4px; }
  .top10-wrap .title { font-size: 16px; color: #3498db; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .top10-wrap .title .badge { background: #3498db; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
  .tr-h { display: flex; align-items: center; padding: 4px 0; border-bottom: 1px solid #2a4050; gap: 4px; font-size: 11px; color: #556677; margin-bottom: 2px; }
  .tr { display: flex; align-items: center; padding: 9px 0; border-bottom: 1px solid #1f3345; gap: 4px; }
  .tr:last-child { border-bottom: none; }
  .tr .rn { display: inline-flex; width: 18px; height: 18px; align-items: center; justify-content: center; border-radius: 3px; font-size: 10px; font-weight: bold; flex-shrink: 0; }
  .rn1 { background: #f39c12; color: #0f1923; } .rn2 { background: #95a5a6; color: #0f1923; } .rn3 { background: #cd7f32; color: #fff; }
  .rno { background: #2c3e50; color: #667788; }
  .col-rn { width: 20px; text-align: center; flex-shrink: 0; }
  .col-name { width: 66px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; }
  .col-name .nm { font-size: 13px; }
  .col-code { width: 52px; font-size: 10px; color: #667788; flex-shrink: 0; }
  .col-ind { width: 62px; font-size: 11px; color: #5a9fd4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; text-align: center; }
  .col-con { flex: 1; min-width: 0; font-size: 11px; color: #8899aa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .col-pr { width: 64px; text-align: right; font-weight: bold; font-size: 13px; flex-shrink: 0; }
  .col-pc { width: 54px; text-align: right; font-size: 13px; flex-shrink: 0; }

  /* 自选股 */
  .wl-wrap { background: #1a2a3a; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .wl-wrap .title { font-size: 16px; color: #2ecc71; margin-bottom: 12px; }
  .wl-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 6px; }
  .wl-item { background: #0f1923; border-radius: 6px; padding: 6px 10px; display: flex; justify-content: space-between; align-items: center; }
  .wl-item .nm { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .wl-item .nm .cd { color: #667788; font-size: 10px; margin-left: 4px; }
  .wl-item .pct { font-size: 12px; font-weight: bold; flex-shrink: 0; }
  .btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; border: none; transition: all .2s; }
  .btn-primary { background: #3498db; color: #fff; }
  .btn-primary:hover { background: #2980b9; }
  .btn-success { background: #27ae60; color: #fff; }
  .btn-success:hover { background: #219a52; }
  .btn-ghost { background: transparent; color: #8899aa; border: 1px solid #334455; }
  .btn-ghost:hover { background: #1a2a3a; color: #e0e6ed; }

  .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center; }
  .modal-overlay.active { display: flex; }
  .modal { background: #1a2a3a; border-radius: 12px; padding: 24px; width: 520px; max-width: 94vw; max-height: 90vh; overflow-y: auto; border: 1px solid #334455; }
  .modal h2 { font-size: 18px; margin-bottom: 16px; color: #f39c12; display: flex; align-items: center; gap: 8px; }
  .modal .close { margin-left: auto; cursor: pointer; color: #667788; font-size: 20px; }
  .form-row { display: flex; gap: 12px; margin-bottom: 12px; }
  .form-group { flex: 1; }
  .form-group label { display: block; font-size: 12px; color: #8899aa; margin-bottom: 4px; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid #334455; background: #0f1923; color: #e0e6ed; font-size: 13px; }
  .form-group textarea { resize: vertical; min-height: 40px; }
  .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #3498db; }
  .form-section { font-size: 13px; color: #3498db; margin: 14px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #1f3345; }
  .form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; }

  /* 通知面板 */
  .notif-wrap { background: #1a2a3a; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; overflow: hidden; }
  .notif-wrap .title, .notif-wrap .notif-bar { flex-shrink: 0; }
  .notif-wrap .title { font-size: 16px; color: #e74c3c; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .notif-wrap .title .badge { background: #e74c3c; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
  .notif-bar { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .notif-stat { background: #0f1923; border-radius: 6px; padding: 6px 12px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
  .notif-stat .num { font-weight: bold; font-size: 16px; }
  .notif-stat.buy { border-left: 3px solid #2ecc71; } .notif-stat.sell { border-left: 3px solid #e74c3c; } .notif-stat.pos { border-left: 3px solid #f39c12; }

  .notif-list { flex: 1; overflow-y: auto; min-height: 0; padding-right: 4px; }
  /* 统一滚动条样式 */
  .main-grid ::-webkit-scrollbar { width: 4px; }
  .main-grid ::-webkit-scrollbar-thumb { background: #334455; border-radius: 2px; }
  .main-grid ::-webkit-scrollbar-track { background: transparent; }

  .notif-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px; border-bottom: 1px solid #1f3345; font-size: 13px; }
  .notif-item:last-child { border-bottom: none; }
  .notif-item .badge-type { display: inline-flex; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; flex-shrink: 0; margin-top: 1px; }
  .badge-buy { background: #1a4a2a; color: #2ecc71; }
  .badge-sell { background: #4a1a1a; color: #e74c3c; }
  .badge-pos { background: #4a3a1a; color: #f39c12; }

  .notif-item .ni-body { flex: 1; min-width: 0; }
  .notif-item .ni-header { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
  .notif-item .ni-stock { font-weight: bold; font-size: 13px; }
  .notif-item .ni-level { font-size: 11px; color: #5a9fd4; }
  .notif-item .ni-time { font-size: 11px; color: #667788; margin-left: auto; flex-shrink: 0; }
  .notif-item .ni-msg { font-size: 12px; color: #b0c0d0; }
  .notif-item .ni-score { font-size: 11px; color: #f39c12; flex-shrink: 0; }

  .notif-empty { text-align: center; padding: 30px; color: #556677; font-size: 13px; }

  .empty { text-align: center; padding: 40px; color: #556677; }
  .status-bar { text-align: center; padding: 10px; color: #556677; font-size: 12px; margin-top: 10px; }

  @media (max-width: 1200px) { .main-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } }
  @media (max-width: 600px) { .indices { gap: 8px; } .index-card { min-width: calc(50% - 4px); } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📊 盯盘 Dashboard</h1>
    <div class="time" id="updateTime">加载中...</div>
  </div>
  <div class="indices" id="indicesBar"></div>
  <div class="main-grid">
    <div id="positionCol">
      <div id="positionPanel"><div class="empty"><div class="icon" style="font-size:40px">📦</div>加载持仓中...</div></div>
    </div>
    <div id="notifCol">
      <div class="notif-wrap" id="notifPanel">
        <div class="title">📡 盯盘通知 <span class="badge" id="notifCountBadge">0</span></div>
        <div class="notif-bar" id="notifStatBar">
          <div class="notif-stat buy">🟢 买入 <span class="num" id="notifBuyCount">0</span></div>
          <div class="notif-stat sell">🔴 卖出 <span class="num" id="notifSellCount">0</span></div>
          <div class="notif-stat pos">🟡 持仓 <span class="num" id="notifPosCount">0</span></div>
          <div class="notif-stat" style="border-left-color:#667788;color:#8899aa;">⏱ <span id="notifUpdateTime">-</span></div>
        </div>
        <div class="notif-list" id="notifList">
          <div class="notif-empty">📡 等待通知数据...</div>
        </div>
      </div>
    </div>
    <div id="top10Col">
      <div id="top10Panel"><div class="empty"><div class="icon" style="font-size:40px">⭐</div>加载重点股中...</div></div>
    </div>
  </div>
  <div id="watchlistPanel"></div>
  <div style="text-align:center; margin-bottom:12px;">
    <button class="btn btn-primary" onclick="openModal()">📝 手动录入持仓</button>
  </div>
  <div class="status-bar" id="statusBar">⏱ 等待数据...</div>
</div>

<!-- 手动录入持仓弹窗 -->
<div class="modal-overlay" id="positionModal">
  <div class="modal">
    <h2>📝 手动录入持仓 <span class="close" onclick="closeModal()">✕</span></h2>
    <form id="posForm" onsubmit="return submitPosition(event)">

      <div class="form-section">📌 基础信息</div>
      <div class="form-row">
        <div class="form-group">
          <label>股票代码 *</label>
          <input type="text" name="code" required placeholder="如 300450" value="300450">
        </div>
        <div class="form-group">
          <label>股票名称 *</label>
          <input type="text" name="name" required placeholder="如 先导智能" value="先导智能">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>持股数量 *</label>
          <input type="number" name="shares" required min="1" placeholder="股数">
        </div>
        <div class="form-group">
          <label>成本价 *</label>
          <input type="number" name="cost" required step="0.001" placeholder="买入均价">
        </div>
      </div>

      <div class="form-section">📋 买卖逻辑</div>
      <div class="form-row">
        <div class="form-group">
          <label>级别</label>
          <select name="level">
            <option value="日线">日线</option>
            <option value="60分钟">60分钟</option>
            <option value="30分钟">30分钟</option>
            <option value="15分钟" selected>15分钟</option>
            <option value="5分钟">5分钟</option>
            <option value="分时">分时</option>
          </select>
        </div>
        <div class="form-group">
          <label>止损价</label>
          <input type="number" name="stop_loss" step="0.001" placeholder="跌破此价止损">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>周线背景</label>
          <input type="text" name="weekly_note" placeholder="周线趋势">
        </div>
        <div class="form-group">
          <label>日线结构</label>
          <input type="text" name="daily_note" placeholder="日线买卖点">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>15分钟信号</label>
          <input type="text" name="min15_note" placeholder="15分钟结构">
        </div>
        <div class="form-group">
          <label>目标空间</label>
          <input type="text" name="target" placeholder="目标价位">
        </div>
      </div>
      <div class="form-section">📖 入场理由</div>
      <div class="form-row">
        <div class="form-group">
          <textarea name="buy_reason" rows="3" placeholder="写下你买入的理由、依据、观察到的信号…" style="width:100%;"></textarea>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>止损线含义</label>
          <input type="text" name="stop_loss_meaning" placeholder="为什么设这个止损" value="这一波下跌的低点">
        </div>
        <div class="form-group">
          <label>预警线</label>
          <input type="number" name="warning_line" step="0.001" placeholder="自动=成本*0.97">
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">取消</button>
        <button type="submit" class="btn btn-success">✅ 确认录入</button>
      </div>
    </form>
  </div>
</div>

<script>
const API = '/api/dashboard';
const POLL = 5000;

function fp(v) { return (v||0).toFixed(2); }
function pct(v) {
  if (v===null||v===undefined) return '-';
  const s=v>=0?'+':'';
  return `<span class="${v>=0?'up':'down'}">${s}${v.toFixed(2)}%</span>`;
}
function vol(v) {
  if (!v) return '-';
  if (v>=1e8) return (v/1e8).toFixed(2)+'亿';
  if (v>=1e4) return (v/1e4).toFixed(0)+'万';
  return v;
}

function renderIndices(d) {
  let h='';
  for(const [c,v] of Object.entries(d||{})){
    const cls=(v.change_pct||0)>=0?'up':'down';
    const s=(v.change_pct||0)>=0?'+':'';
    h+=`<div class="index-card"><div class="name">${v.name}</div><div class="price ${cls}">${fp(v.price)}</div><div class="change ${cls}">${s}${(v.change_pct||0).toFixed(2)}%</div></div>`;
  }
  document.getElementById('indicesBar').innerHTML=h||'<div class="index-card">暂无指数</div>';
}

function renderPositions(ps) {
  const el=document.getElementById('positionPanel');
  if(!ps||!ps.length) return el.innerHTML='<div class="empty"><div style="font-size:40px">📦</div>暂无持仓</div>';

  let h='';
  for(const p of ps){
    const c=(p.pnl_pct||0)>=0?'up':'down';
    const s=(p.pnl_pct||0)>=0?'+':'';
    const isLoss=(p.pnl_pct||0)<=-5;
    const r=p.buy_reason||{};

    h+=`<div class="pos-wrap" style="${isLoss?'border-color:#e74c3c':''}">
      <div class="title">
        📌 持仓 ${isLoss?'⚠️ 已达止损警戒':''}
        <span class="badge">${p.shares}股</span>
      </div>
      <div class="pos-row1">
        <div><div class="pos-name">${p.name}</div><div class="pos-code">${p.code}</div></div>
        <div class="pos-price-lg ${c}">${fp(p.price)}</div>
      </div>
      <div class="pos-grid">
        <div class="item"><div class="lbl">成本价</div><div class="val">${fp(p.cost)}</div></div>
        <div class="item"><div class="lbl">盈亏</div><div class="val ${c}">${s}${fp(p.pnl_amt)}</div></div>
        <div class="item"><div class="lbl">盈亏率</div><div class="val ${c}">${s}${(p.pnl_pct||0).toFixed(2)}%</div></div>
        <div class="item"><div class="lbl">最高/低</div><div class="val">${fp(p.high)}/${fp(p.low)}</div></div>
      </div>
      <!-- 买入依据（可滚动） -->
      <div class="reason-box" style="flex:1; overflow-y:auto; min-height:60px;">
        <div class="r-title">📋 买入依据 — ${r['级别']||'多级别联立分析'}</div>
        <div class="r-line"><span class="r-label">周线</span><span class="r-value">${r['周线']||'-'}</span></div>
        <div class="r-line"><span class="r-label">日线</span><span class="r-value">${r['日线']||'-'}</span></div>
        <div class="r-line"><span class="r-label">15分钟</span><span class="r-value">${r['15分钟']||'-'}</span></div>
        <div class="r-line"><span class="r-label">入场</span><span class="r-value">${r['入场规则']||'-'}</span></div>
        <div class="r-line"><span class="r-label">目标</span><span class="r-value">${r['目标空间']||'-'}</span></div>
      </div>
      <!-- 止损（固定） -->
      <div class="stop-loss-box" style="flex-shrink:0;">
        <div class="sl-line">🔴 止损价：<strong>${fp(r['止损价']||p.cost*0.95)}</strong> — ${r['止损线含义']||'跌破无条件止损'}</div>
        <div class="sl-line">⚡ 预警线：${fp(r['预警线']||p.cost*0.97)} — ${r['预警线含义']||'结构动摇信号'}</div>
        <div class="sl-line">📊 盈亏比：${r['盈亏比']||'-'}</div>
      </div>
    </div>`;
  }
  el.innerHTML=h;
}

function renderTop10(tt) {
  const el=document.getElementById('top10Panel');
  if(!tt||!tt.length) return el.innerHTML='<div class="top10-wrap" style="display:flex;flex-direction:column"><div class="title">⭐ 重点关注</div><div class="empty">暂无数据</div></div>';

  let h=`<div class="top10-wrap"><div class="title">⭐ 重点关注 <span class="badge">TOP ${tt.length}</span></div>
 <div class="tr-h"><span class="col-rn">#</span><span class="col-name">名称</span><span class="col-code">代码</span><span class="col-ind">行业</span><span class="col-con">概念</span><span class="col-pr">价格</span><span class="col-pc">涨跌</span></div>
 <div class="top10-scroll">`;
  for(let i=0;i<tt.length;i++){
    const s=tt[i];
    const cls=(s.change_pct||0)>=0?'up':'down';
    const sign=(s.change_pct||0)>=0?'+':'';
    const rc=i===0?'rn1':i===1?'rn2':i===2?'rn3':'rno';
    h+=`<div class="tr">
      <span class="rn col-rn ${rc}">${i+1}</span>
      <span class="col-name"><span class="nm">${s.name||s.code}</span></span>
      <span class="col-code">${s.code}</span>
      <span class="col-ind">${s.industry||'-'}</span>
      <span class="col-con" title="${s.concept||''}">${s.concept?((s.concept.split(',').length>2?s.concept.split(',').slice(0,2).join(',')+(s.concept.split(',').length>2?'...':''):s.concept)):''}</span>
      <span class="col-pr ${cls}">${fp(s.price)}</span>
      <span class="col-pc ${cls}">${sign}${(s.change_pct||0).toFixed(2)}%</span>
    </div>`;
  }
  h+='</div></div>';
  el.innerHTML=h;
}

// ─── 自选股排序 ─────────────────────────────────────
let _wlData = [];
let _wlSortDir = 'desc'; // 'desc'=涨幅从高到低  'asc'=从低到高

function renderWatchlist(wl) {
  const el=document.getElementById('watchlistPanel');
  if(!wl||!wl.length) return el.innerHTML='<div class="wl-wrap"><div class="title">📋 自选股</div><div class="empty">暂无</div></div>';
  _wlData = wl;
  _renderSortedWatchlist();
}

function _renderSortedWatchlist() {
  const el=document.getElementById('watchlistPanel');
  const sorted = [..._wlData].sort((a,b) => {
    return _wlSortDir === 'desc'
      ? (b.change_pct||0) - (a.change_pct||0)
      : (a.change_pct||0) - (b.change_pct||0);
  });
  const arrow = _wlSortDir === 'desc' ? '↓' : '↑';
  let h=`<div class="wl-wrap"><div class="title" style="display:flex;align-items:center;gap:8px;">
    <span>📋 全部自选股（${_wlData.length} 只）</span>
    <span onclick="toggleWlSort()" style="cursor:pointer;font-size:12px;background:#1f3345;padding:3px 10px;border-radius:4px;color:#8899aa;user-select:none;">
      涨幅 ${arrow}
    </span>
  </div><div class="wl-grid">`;
  for(const s of sorted){
    const cls=(s.change_pct||0)>=0?'up':'down';
    const sign=(s.change_pct||0)>=0?'+':'';
    const nm=s.name||s.code;
    h+=`<div class="wl-item"><span class="nm">${nm}<span class="cd">${s.code}</span></span><span class="pct ${cls}">${sign}${(s.change_pct||0).toFixed(2)}%</span></div>`;
  }
  h+='</div></div>';
  el.innerHTML=h;
}

function toggleWlSort() {
  _wlSortDir = _wlSortDir === 'desc' ? 'asc' : 'desc';
  _renderSortedWatchlist();
}

async function load(){
  try{
    const r=await fetch(API);
    const d=await r.json();
    renderIndices(d.indices);
    renderPositions(d.positions);
    renderTop10(d.top10);
    renderWatchlist(d.watchlist);
    document.getElementById('updateTime').textContent='⏱ '+d.update_time;
    document.getElementById('statusBar').textContent='✅ 实时 | 自选'+d.total_watchlist+'只 | '+d.update_time;
    window._lastData=d;
  }catch(e){
    document.getElementById('statusBar').textContent='❌ '+e.message;
  }
}

// 手动录入持仓
function openModal(){ document.getElementById('positionModal').classList.add('active'); }
function closeModal(){ document.getElementById('positionModal').classList.remove('active'); }
// 点击蒙层关闭
document.getElementById('positionModal').addEventListener('click',function(e){ if(e.target===this) closeModal(); });

async function submitPosition(e){
  e.preventDefault();
  const fd=new URLSearchParams(new FormData(e.target));
  const btn=e.target.querySelector('button[type=submit]');
  btn.textContent='⏳ 提交中...'; btn.disabled=true;

  try{
    const r=await fetch('/api/position/add', {method:'POST', body:fd, headers:{'Content-Type':'application/x-www-form-urlencoded'}});
    const d=await r.json();
    if(d.ok){
      closeModal();
      e.target.reset();
      // 刷新数据
      load();
      document.getElementById('statusBar').textContent='✅ '+d.message;
    } else {
      alert('提交失败: '+d.message);
    }
  }catch(e){
    alert('网络错误: '+e.message);
  }finally{
    btn.textContent='✅ 确认录入'; btn.disabled=false;
  }
  return false;
}

// ─── 通知面板 ─────────────────────────────────────────
const NOTIF_API = '/api/notifications';
const NOTIF_POLL = 3000;

function renderNotifications(data){
  const list=document.getElementById('notifList');
  const alerts=data.alerts||[];
  document.getElementById('notifCountBadge').textContent=alerts.length;

  // 统计
  let buyN=0, sellN=0, posN=0;
  for(const a of alerts){
    if(a.type && a.type.includes('buy')) buyN++;
    else if(a.type && a.type.includes('sell')) sellN++;
    else if(a.type && a.type.startsWith('position_')) posN++;
  }
  document.getElementById('notifBuyCount').textContent=buyN;
  document.getElementById('notifSellCount').textContent=sellN;
  document.getElementById('notifPosCount').textContent=posN;
  document.getElementById('notifUpdateTime').textContent=data.updated_at||'-';

  if(!alerts.length){
    list.innerHTML='<div class="notif-empty">📡 暂无通知，系统正常运行中</div>';
    return;
  }

  // 取最近30条
  const show=alerts.slice(0,30);
  let h='';
  for(const a of show){
    let badge, badgeClass;
    if(a.type && a.type.includes('buy')){
      badge='买入'; badgeClass='badge-buy';
    }else if(a.type && a.type.includes('sell')){
      badge='卖出'; badgeClass='badge-sell';
    }else{
      badge='持仓'; badgeClass='badge-pos';
    }
    const time=a.time||a.timestamp||'';
    const lvl=a.signal_level_cn||'';
    const score=a.score?`⭐${a.score}`:'';
    const nm=a.name||a.code||'';
    const msg=a.message||'';

    h+=`<div class="notif-item">
      <span class="badge-type ${badgeClass}">${badge}</span>
      <div class="ni-body">
        <div class="ni-header">
          <span class="ni-stock">${nm}</span>
          ${lvl?`<span class="ni-level">${lvl}</span>`:''}
          <span class="ni-time">${time}</span>
        </div>
        <div class="ni-msg">${msg}</div>
      </div>
      ${score?`<span class="ni-score">${score}</span>`:''}
    </div>`;
  }
  list.innerHTML=h;
}

async function loadNotifications(){
  try{
    const r=await fetch(NOTIF_API);
    const d=await r.json();
    renderNotifications(d);
  }catch(e){
    // 静默失败，不影响主面板
  }
}
load();
setInterval(load, POLL);
loadNotifications();
setInterval(loadNotifications, NOTIF_POLL);
</script>
