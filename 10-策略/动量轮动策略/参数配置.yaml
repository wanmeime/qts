# 动量轮动策略 - 参数配置
# 最后更新: 2026-06-02

# ============================================================
# 数据源配置
# ============================================================
data:
  # A股全市场行情数据路径
  source_path: "/home/jiaod/qts/00-研究/数据源/缓存/A股全市场行情.csv"
  # 编码格式
  encoding: "utf-8"

# ============================================================
# 信号输出配置
# ============================================================
output:
  # 信号输出目录
  signal_dir: "/home/jiaod/qts/30-信号/"
  # 文件名前缀
  file_prefix: "动量轮动_买入信号"
  # 输出格式: csv
  format: "csv"

# ============================================================
# 股票过滤规则
# ============================================================
filter:
  # 排除ST/*ST股票
  exclude_st: true
  # 排除名称包含这些关键词的股票
  exclude_keywords:
    - "ST"
    - "*ST"
    - "退市"
    - "退"
  # 最低成交额阈值（单位：元）
  min_turnover_amount: 10000000  # 1000万
  # 排除最新价为0或NaN的股票
  exclude_zero_price: true

# ============================================================
# 动量因子参数
# ============================================================
momentum:
  # 短期动量周期（天）
  short_period: 5
  # 中期动量周期（天）
  mid_period: 10
  # 长期动量周期（天）
  long_period: 20

  # 综合得分权重
  weights:
    short: 0.5    # 短期权重
    mid: 0.3      # 中期权重
    long: 0.2     # 长期权重

# ============================================================
# 选股参数
# ============================================================
selection:
  # 选股数量（买入信号数量）
  top_n: 20
  # 排序方式: desc(降序) / asc(升序)
  sort_order: "desc"

# ============================================================
# 日志配置
# ============================================================
logging:
  # 是否打印详细日志
  verbose: true
  # 是否保存运行日志文件
  save_log: false
  # 日志目录
  log_dir: "/home/jiaod/qts/10-策略/动量轮动策略/logs/"
