# 盯盘系统配置
# 最后更新: 2026-06-14

# ============================================================
# 运行配置
# ============================================================
watcher:
  # 扫描间隔（秒）
  interval: 300
  # 仅交易时段运行
  market_hours_only: true
  # 交易时段
  market_open: "09:30"
  market_close: "15:00"

# ============================================================
# 数据源配置
# ============================================================
data:
  # 自选股列表路径
  watchlist_path: "/home/jiaod/qts/00-研究/自选股/watchlist.json"
  # K线缓存目录
  kline_cache_dir: "/home/jiaod/qts/00-研究/数据源/缓存/kline_6m"
  # K线获取天数
  kline_days: 120
  # 复权方式
  adjust: "qfq"

# ============================================================
# 持仓配置（手动填写）
# ============================================================
# 格式：代码: 名称, 成本价, 持股数
positions:
  # "600519": {name: "贵州茅台", cost: 1600.00, shares: 100}
  # "000858": {name: "五粮液", cost: 120.00, shares: 200}
  # "300750": {name: "宁德时代", cost: 200.00, shares: 100}

# ============================================================
# 告警规则
# ============================================================
alert:
  enabled: true
  rules:
    # 涨跌幅告警
    - name: "大涨告警"
      change_pct_above: 5.0
    - name: "大跌告警"
      change_pct_below: -5.0

    # 信号告警
    - name: "买入信号"
      signal_types: ["buy_1", "buy_2", "buy_2_like"]
      min_score: 60
    - name: "卖出信号"
      signal_types: ["sell_1", "sell_2"]
      min_score: 60

# ============================================================
# 缠论分析参数
# ============================================================
chanlun:
  macd:
    fast: 12
    slow: 26
    signal: 9
  divergence_window: 20

# ============================================================
# 信号生成参数
# ============================================================
signal:
  weights:
    buy_point: 0.4
    macd_confirm: 0.25
    volume_confirm: 0.15
    trend_score: 0.2
  min_score: 50
