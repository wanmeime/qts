# 自选股监控 - 参数配置
# 最后更新: 2026-06-07

# ============================================================
# 数据源配置
# ============================================================
data:
  # 自选股列表路径
  watchlist_path: "/home/jiaod/qts/00-研究/自选股/watchlist.json"
  # K线缓存目录
  kline_cache_dir: "/home/jiaod/qts/00-研究/数据源/缓存/kline_6m"
  # K线获取天数（向前取多少天）
  kline_days: 120
  # 复权方式: qfq前复权 / hfq后复权 / 空字符串不复权
  adjust: "qfq"

# ============================================================
# 市场过滤
# ============================================================
market:
  # 启用的市场（空列表=全部）
  enabled_markets:
    - "上海A股"
    - "深圳A股"
  # 跳过的市场
  skip_markets:
    - "美股"
    - "创业板"

# ============================================================
# 缠论分析参数
# ============================================================
chanlun:
  # MACD 参数
  macd:
    fast: 12
    slow: 26
    signal: 9
  # 分型识别：最少K线数
  min_klines_for_fractal: 5
  # 中枢识别：最少重叠K线数
  min_zhongshu_bars: 3
  # 背驰判断：MACD面积比较窗口
  divergence_window: 20

# ============================================================
# 信号生成参数
# ============================================================
signal:
  # 信号评分权重
  weights:
    buy_point: 0.4       # 买点类型权重
    macd_confirm: 0.25   # MACD确认权重
    volume_confirm: 0.15 # 量能确认权重
    trend_score: 0.2     # 趋势得分权重
  # 最低信号分数（0-100）
  min_score: 50
  # 输出目录
  output_dir: "/home/jiaod/qts/30-信号/"
  output_prefix: "自选股监控"

# ============================================================
# 运行配置
# ============================================================
runtime:
  # 并发数（AKShare请求间隔）
  request_delay: 0.3
  # 日志级别: DEBUG / INFO / WARNING
  log_level: "INFO"
